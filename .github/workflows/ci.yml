name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # The toolchain version is the cyrius.cyml [package].cyrius pin — the
        # single source of truth, never hardcoded here. Hand it to the upstream
        # install.sh, which lays out $HOME/.cyrius/{bin,lib,versions/<v>}. The
        # hand-rolled curl+cp-into-bin form is deliberately avoided: it skips
        # versions/<v>/ and so fails the `cyrius deps` pin-check.
        # Reference: patra / sigil.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        # Fetches the tyche git dependency (rng for t_randn) and vendors its
        # bundle to lib/tyche.cyr, alongside stdlib.
        run: cyrius deps

      - name: Format check
        run: |
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            cyrius fmt "$f" --check
          done

      - name: Lint
        # Hard gate on warnings; only the cosmetic "exceeds 120 characters"
        # class is tolerated (same policy as sigil's long hex-table lines).
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            bad=$(echo "$out" | grep -E '^[[:space:]]*warn ' | grep -v 'exceeds 120 characters' || true)
            if [ -n "$bad" ]; then
              echo "lint: non-cosmetic warnings in $f"; fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: non-cosmetic warnings present"; exit 1; }

      - name: Build smoke
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/rosnet
          echo "smoke: $(wc -c < build/rosnet) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/rosnet | grep -q "7f45 4c46"

      - name: Run smoke
        run: ./build/rosnet

      - name: Tests
        # Plural `cyrius tests` recursively runs tests/*.tcyr — rosnet's
        # correctness gate (tests/rosnet.tcyr): exact BLAS-1 ops + CENTRAL
        # finite-difference grad-checks of linear_bwd (dx/dW/db < 1e-5),
        # ported from attn11. `cyrius test <file>` runs a single program and
        # would NOT reach the suite.
        run: cyrius tests

      - name: Benchmarks
        run: CYRIUS_DCE=1 cyrius bench tests/rosnet.bcyr

      - name: Fuzz
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build tests/rosnet.fcyr build/rosnet-fuzz
          timeout 30 ./build/rosnet-fuzz || { echo "FUZZ CRASH"; exit 1; }

      - name: distlib drift check
        # rosnet is a LIBRARY: consumers import dist/rosnet.cyr (the [lib]
        # bundle), not src/. Regenerate and fail if the committed bundle is
        # stale, so a release can never ship a dist/ that lags src/. `cyrius
        # distlib` is byte-deterministic, so `git diff --exit-code` is a valid
        # sync gate. (The bundle leaves tyche's rng_normal unresolved by design —
        # consumers supply it via their own [deps.tyche].)
        run: |
          cyrius distlib
          git diff --exit-code dist/ \
            || { echo "FAIL: dist/rosnet.cyr is stale — run 'cyrius distlib' and commit."; exit 1; }

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Informational. rosnet is pure arithmetic — no process/path/exec
        # surface — so these never fire today; kept for parity with sibling lib
        # repos and to catch a future regression.
        run: |
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"
          fi
          echo "security scan complete"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        # Only files that exist in rosnet are gated — gating an absent file would
        # falsely red the build. dist/rosnet.cyr is required: it is the shipped
        # consumable bundle.
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml dist/rosnet.cyr; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives version from the VERSION
          # file — VERSION is the single source of truth. Resolve the template to
          # the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW)"
