name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives version from the
          # VERSION file — VERSION is the single source of truth. Resolve
          # the template to the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyml: $CYML_RAW)"

      - name: Install Cyrius toolchain
        # Same upstream install.sh form as CI: version read from cyrius.cyml's
        # [package].cyrius pin (never hardcoded), piped through the official
        # installer so `cyrius deps` pin-check passes.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Build smoke (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/rosnet
          echo "rosnet smoke: $(wc -c < build/rosnet) bytes"

      - name: Regenerate bundle
        # `cyrius distlib` reads [lib].modules (tensor.cyr, linear.cyr) from
        # cyrius.cyml and writes dist/rosnet.cyr with the version header
        # re-stamped from VERSION. CI's distlib drift check already proved the
        # committed bundle is in sync; regenerating here guarantees the
        # published artifact ships freshly-built bytes.
        run: cyrius distlib

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rm -f rosnet-*.tar.gz rosnet-*.cyr
          git archive --format=tar.gz --prefix="rosnet-${TAG}/" -o "rosnet-${TAG}-src.tar.gz" HEAD
          # Ship the distlib bundle as a standalone, version-stamped asset —
          # consumers import this via [deps.rosnet] modules = ["dist/rosnet.cyr"].
          cp dist/rosnet.cyr "rosnet-${TAG}.cyr"
          sha256sum rosnet-*.tar.gz rosnet-*.cyr build/rosnet > SHA256SUMS

      - name: Extract changelog
        run: |
          awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
          [ -s /tmp/body.md ] || echo "No changelog entry for ${GITHUB_REF_NAME}." > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "rosnet ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            rosnet-*.tar.gz
            rosnet-*.cyr
            build/rosnet
            SHA256SUMS
